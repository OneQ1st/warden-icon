<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Icon Proxy</title>
    <style>body{font-family:sans-serif;padding:20px;background:#f4f4f4}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px}.card{background:#fff;padding:15px;border-radius:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1);cursor:pointer}img{width:100px;height:100px;border-radius:5px}input{width:100%;padding:15px;margin-bottom:20px;border:1px solid #ddd;border-radius:5px}</style>
</head>
<body>
    <input type="text" id="s" placeholder="搜索图标...">
    <div class="grid" id="g"></div>
    <script>
        const g=document.getElementById('g');
        fetch('/icons.json').then(r=>r.json()).then(d=>{
            window.icons=d; render(d);
        });
        function render(arr){
            g.innerHTML=arr.map(n=>`<div class="card" onclick="copy('${window.location.origin}/${n}/icon.png')"><img src="/${n}/icon.png"><p>${n}</p></div>`).join('');
        }
        function copy(t){ navigator.clipboard.writeText(t); alert('链接已复制'); }
        document.getElementById('s').oninput=(e)=>render(window.icons.filter(i=>i.includes(e.target.value)));
    </script>
</body>
</html>
