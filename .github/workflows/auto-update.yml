name: Auto Update JSON Index

# 触发条件：当你向 main 分支推送代码（包括删除文件）时自动运行
on:
  push:
    branches:
      - main
    # 忽略单纯修改这些文件时的触发，省点资源
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 运行生成脚本
        run: python gen.py

      - name: 自动提交更新后的 index.json
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          # 检查如果有变动，就自动提交并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update index.json after file changes" && git push)
